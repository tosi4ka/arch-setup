general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = /home/tosi4ka/.config/hypr/wallpaper
    blur_passes = 2
    blur_size = 5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    outer_color = rgb(7f77dd)
    inner_color = rgb(1a1a1e)
    font_color = rgb(ffffff)
    fade_on_empty = true
    placeholder_text = <i>Пароль...</i>
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] hyprctl devices -j | python3 -c "import json,sys; kbs=[k for k in json.load(sys.stdin)['keyboards'] if 'virtual' not in k['name']]; km=kbs[-1]['active_keymap'] if kbs else ''; print('RU' if 'Russian' in km else 'EN')"
    color = rgba(7f77ddff)
    font_size = 16
    font_family = JetBrains Mono Bold
    position = 0, -160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(ffffffff)
    font_size = 72
    font_family = JetBrains Mono
    position = 0, 200
    halign = center
    valign = center
}

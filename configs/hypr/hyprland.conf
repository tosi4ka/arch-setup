# ============================================================
# Hyprland config
# Acer Swift 3 | i7-1260P | eDP-1 + DP-3
# ============================================================

# ----- Мониторы -----
monitor = eDP-1, 1920x1080@60, 0x0, 1
monitor = DP-3,  1920x1080@60, 1920x0, 1

# ----- Переменные -----
$terminal    = kitty
$menu        = rofi -show drun
$browser     = chromium
$filemanager = thunar
$mod         = SUPER

# ----- Автозапуск -----
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = hyprpaper
exec-once = ~/.local/bin/auto-layout.sh


# ----- Env -----
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,WhiteSur
env = GTK_THEME,WhiteSur-Dark
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = MOZ_ENABLE_WAYLAND,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# ----- Внешний вид -----
general {
    gaps_in           = 5
    gaps_out          = 10
    border_size       = 2
    col.active_border   = rgba(7f77ddee) rgba(1d9e75ee) 45deg
    col.inactive_border = rgba(44444180)
    resize_on_border  = true
    layout            = dwindle
}

decoration {
    rounding         = 10
    active_opacity   = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled      = true
        range        = 8
        render_power = 2
        color        = rgba(00000044)
    }

    blur {
        enabled  = true
        size     = 6
        passes   = 2
        vibrancy = 0.2
    }
}

animations {
    enabled = true
    bezier  = smooth, 0.05, 0.9, 0.1, 1.05
    animation = windows,    1, 5, smooth
    animation = windowsOut, 1, 4, default, popin 80%
    animation = fade,       1, 5, default
    animation = workspaces, 1, 5, smooth, slide
}

dwindle {
    preserve_split = true
}

# ----- Ввод -----
input {
    kb_layout  = us,ru
    kb_options = grp:win_space_toggle
    follow_mouse = 0
    sensitivity  = 0

    touchpad {
        natural_scroll = true
        tap-to-click   = true
        drag_lock      = true
        scroll_factor  = 0.5
    }
}

# ----- Разное -----
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

# ----- Хоткеи -----

# Основные
bind = $mod, Return,   exec, $terminal
bind = $mod, Q,        killactive
bind = $mod, M,        exit
bind = $mod, E,        exec, $filemanager
bind = $mod, V,        togglefloating
bind = $mod, D,        exec, $menu
bind = $mod, F,        fullscreen
bind = $mod, L,        exec, hyprlock
bind = $mod, P,        exec, ~/.local/bin/monitor-picker.py
bind = $mod CTRL, P,   pseudo

# Специальный воркспейс
bind = $mod, grave,      togglespecialworkspace

# Скриншоты
bind = $mod, F3,        exec, ~/.local/bin/screenshot-tool.py
bind = $mod SHIFT, S,   exec, ~/.local/bin/screenshot-tool.py

# Навигация по окнам
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Воркспейсы
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Переместить окно на воркспейс
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Переместить окно между мониторами
bind = $mod, comma,  movecurrentworkspacetomonitor, l
bind = $mod, period, movecurrentworkspacetomonitor, r

# Скролл по воркспейсам мышью
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Перемещение/ресайз окон мышью
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Громкость (через acpid — F1/F2/F3)
bindel = , XF86AudioRaiseVolume,  exec, pamixer -i 5 && ~/.local/bin/volume-notify.sh
bindel = , XF86AudioLowerVolume,  exec, pamixer -d 5 && ~/.local/bin/volume-notify.sh
bindel = , XF86AudioMute,         exec, pamixer -t && ~/.local/bin/volume-notify.sh

# Яркость (через acpid — F5/F6)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Микрофон F4
bind = , XF86Launch6, exec, ~/.local/bin/mic-toggle.sh

bind = , XF86RFKill,      exec, ~/.local/bin/rfkill-notify.sh
bind = , XF86TouchpadOff, exec, ~/.local/bin/touchpad-notify.sh off
bind = , XF86TouchpadOn,  exec, ~/.local/bin/touchpad-notify.sh on

bind = $mod SHIFT, R, exec, ~/.local/bin/restart-scripts.sh

bind = $mod, W, exec, ~/.local/bin/wallpaper-picker.sh

